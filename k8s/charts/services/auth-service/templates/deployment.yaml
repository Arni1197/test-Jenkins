apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  labels:
    app.kubernetes.io/name: auth-service
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: auth-service
  template:
    metadata:
      annotations:
        instrumentation.opentelemetry.io/inject-nodejs: "jaeger/nodejs-instrumentation"
      labels:
        app.kubernetes.io/name: auth-service
    spec:
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: auth-service
          image: "{{ .Values.image.repository }}{{- if .Values.image.digest }}@{{ .Values.image.digest }}{{- else }}:{{ .Values.image.tag }}{{- end }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | quote }}
          ports:
            - containerPort: {{ .Values.service.port }}

          env:
            - name: OTEL_SERVICE_NAME
              value: "auth-service"

          envFrom:
            - secretRef:
                name: {{ .Values.secrets.envSecretName | default "secret-auth" | quote }}

          resources:
{{ toYaml .Values.resources | indent 12 }}