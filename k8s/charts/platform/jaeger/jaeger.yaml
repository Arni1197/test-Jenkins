apiVersion: v1
kind: Namespace
metadata:
  name: jaeger

---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: jaeger
spec:
  selector:
    app: jaeger
  ports:
    - name: ui
      port: 16686
      targetPort: 16686
    - name: collector-http
      port: 14268
      targetPort: 14268
    - name: collector-grpc
      port: 14250
      targetPort: 14250

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: jaeger
  namespace: jaeger
spec:
  serviceName: jaeger
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      securityContext:
        fsGroup: 10001

      initContainers:
        - name: init-chown-badger
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /badger/data /badger/key
              chown -R 10001:10001 /badger
          volumeMounts:
            - name: jaeger-storage
              mountPath: /badger

      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:1.53
          imagePullPolicy: IfNotPresent
          ports:
            - name: ui
              containerPort: 16686
            - name: collector-http
              containerPort: 14268
            - name: collector-grpc
              containerPort: 14250
          env:
            - name: SPAN_STORAGE_TYPE
              value: badger
            - name: BADGER_EPHEMERAL
              value: "false"
            - name: BADGER_DIRECTORY_VALUE
              value: /badger/data
            - name: BADGER_DIRECTORY_KEY
              value: /badger/key
          volumeMounts:
            - name: jaeger-storage
              mountPath: /badger
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
  volumeClaimTemplates:
    - metadata:
        name: jaeger-storage
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: nvme.network-drives.csi.timeweb.cloud
        resources:
          requests:
            storage: 10Gi