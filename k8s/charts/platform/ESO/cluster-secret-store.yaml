apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-backend

spec:
  provider:
    vault:
      server: "https://vault.90.156.210.86.nip.io"
      path: "kv"
      version: "v2"

      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "external-secrets"

          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets