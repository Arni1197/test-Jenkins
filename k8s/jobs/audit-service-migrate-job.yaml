apiVersion: batch/v1
kind: Job
metadata:
  name: audit-service-migrate
  namespace: dev
  labels:
    app.kubernetes.io/name: audit-service-migrate
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: audit-service-migrate
    spec:
      restartPolicy: Never

      containers:
        - name: audit-service-migrate
          image: ghcr.io/arni1197/audit-service@sha256:c95b4499704fa889035948847ecebc309d0a2ff421d30542279463a4ed6d15e9
          imagePullPolicy: IfNotPresent

          envFrom:
            - secretRef:
                name: secret-audit-service

          command:
            - sh
            - -ec
            - |
              echo "🚀 Running audit-service migrations..."
              npx prisma migrate deploy
              echo "✅ Migrations completed"