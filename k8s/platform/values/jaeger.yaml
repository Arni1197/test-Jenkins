provisionDataStore:
  cassandra: false
  elasticsearch: false
  kafka: false

storage:
  type: badger
  badger:
    ephemeral: false
    persistence:
      enabled: true
      storageClass: nvme.network-drives.csi.timeweb.cloud
      accessModes:
        - ReadWriteOnce
      size: 10Gi

allInOne:
  enabled: true
  replicaCount: 1
  image:
    tag: "1.53"
  extraEnv:
    - name: BADGER_EPHEMERAL
      value: "false"
    - name: BADGER_DIRECTORY_VALUE
      value: /badger/data
    - name: BADGER_DIRECTORY_KEY
      value: /badger/key
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

agent:
  enabled: false

collector:
  enabled: false

query:
  enabled: false

ingester:
  enabled: false

sampling:
  enabled: false

hotrod:
  enabled: false

spark:
  enabled: false