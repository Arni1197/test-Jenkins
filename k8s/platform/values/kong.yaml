ingressController:
  enabled: false

replicaCount: 2

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

env:
  database: "off"

proxy:
  type: ClusterIP
  http:
    enabled: true
    servicePort: 80
    containerPort: 8000
  tls:
    enabled: false

admin:
  enabled: false

manager:
  enabled: false

dblessConfig:
  config: |
    _format_version: "3.0"

    services:
      - name: api-gateway-staging
        url: http://api-gateway.staging.svc.cluster.local:3000
        routes:
          - name: health-route
            paths:
              - /api/health
            strip_path: false
            plugins:
              - name: response-transformer
                config:
                  remove:
                    headers:
                      - X-Powered-By
                  add:
                    headers:
                      - X-Gateway:kong

          - name: auth-login-route
            paths:
              - /api/auth/login
            strip_path: false
            plugins:
              - name: request-size-limiting
                config:
                  allowed_payload_size: 1
              - name: response-transformer
                config:
                  remove:
                    headers:
                      - X-Powered-By
                  add:
                    headers:
                      - X-Gateway:kong

          - name: auth-register-route
            paths:
              - /api/auth/register
            strip_path: false
            plugins:
              - name: request-size-limiting
                config:
                  allowed_payload_size: 1
              - name: response-transformer
                config:
                  remove:
                    headers:
                      - X-Powered-By
                  add:
                    headers:
                      - X-Gateway:kong

          - name: catalog-route
            paths:
              - /api/catalog
            strip_path: false
            plugins:
              - name: request-size-limiting
                config:
                  allowed_payload_size: 2
              - name: response-transformer
                config:
                  remove:
                    headers:
                      - X-Powered-By
                  add:
                    headers:
                      - X-Gateway:kong

          - name: api-fallback-route
            paths:
              - /api
            strip_path: false
            plugins:
              - name: request-size-limiting
                config:
                  allowed_payload_size: 2
              - name: response-transformer
                config:
                  remove:
                    headers:
                      - X-Powered-By
                  add:
                    headers:
                      - X-Gateway:kong