global:
  enabled: true
  tlsDisable: false

injector:
  enabled: true
  authPath: "auth/kubernetes"
  replicas: 1
  failurePolicy: Ignore
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"

server:
  enabled: true
  updateStrategyType: "OnDelete"

  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

  extraEnvironmentVars:
    VAULT_CACERT: /vault/userconfig/vault-server-tls/ca.crt
    VAULT_TLSCERT: /vault/userconfig/vault-server-tls/tls.crt
    VAULT_TLSKEY: /vault/userconfig/vault-server-tls/tls.key

  extraVolumes:
    - name: vault-server-tls
      type: secret

  dataStorage:
    enabled: true
    size: 10Gi
    mountPath: "/vault/data"
    storageClass: "nvme.network-drives.csi.timeweb.cloud"
    accessMode: ReadWriteOnce

  auditStorage:
    enabled: false
    size: 10Gi
    mountPath: "/vault/audit"
    storageClass: "nvme.network-drives.csi.timeweb.cloud"
    accessMode: ReadWriteOnce

  dev:
    enabled: false

  standalone:
    enabled: false

  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - vault
          topologyKey: kubernetes.io/hostname

  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app.kubernetes.io/name: vault

  ha:
    enabled: true
    replicas: 3

    disruptionBudget:
      enabled: true
      maxUnavailable: null

    raft:
      enabled: true
      setNodeId: true
      config: |-
        ui = true

        listener "tcp" {
          address = "[::]:8200"
          cluster_address = "[::]:8201"

          tls_cert_file = "/vault/userconfig/vault-server-tls/tls.crt"
          tls_key_file = "/vault/userconfig/vault-server-tls/tls.key"
        }

        storage "raft" {
          path = "/vault/data"
        }

        service_registration "kubernetes" {}

  service:
    enabled: true

  readinessProbe:
    enabled: true
    port: 8200

ui:
  enabled: true
  serviceType: "ClusterIP"

csi:
  enabled: false