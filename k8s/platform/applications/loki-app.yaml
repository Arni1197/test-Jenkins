apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
spec:
  project: default

  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: loki-stack
      targetRevision: 2.10.2
      helm:
        releaseName: loki
        valueFiles:
          - $values/k8s/platform/values/loki-app.yaml

    - repoURL: https://github.com/Arni1197/test-Jenkins.git
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: loki

  syncPolicy:
    syncOptions:
      - CreateNamespace=true