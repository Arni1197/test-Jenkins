apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: network-policies-staging
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Arni1197/test-Jenkins.git
    targetRevision: main
    path: k8s/platform/manifests/network-policies/staging

  destination:
    server: https://kubernetes.default.svc
    namespace: staging

  syncPolicy:
    syncOptions:
      - CreateNamespace=false