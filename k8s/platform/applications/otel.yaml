apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-otel
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Arni1197/test-Jenkins.git
    targetRevision: main
    path: k8s/platform/manifests/otel

  destination:
    server: https://kubernetes.default.svc
    namespace: jaeger

  syncPolicy:
    syncOptions:
      - CreateNamespace=false