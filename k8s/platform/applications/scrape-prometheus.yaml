apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: scrape-monitoring
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Arni1197/test-Jenkins.git
    targetRevision: main
    path: k8s/platform/manifests/monitoring

  destination:
    server: https://kubernetes.default.svc
    namespace: kube-prometheus-stack

  syncPolicy:
    syncOptions:
      - CreateNamespace=false