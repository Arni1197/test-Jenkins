apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: audit-db-secret
  namespace: dev

spec:
  refreshInterval: 1h

  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore

  target:
    name: audit-db-secret
    creationPolicy: Owner

  data:
    - secretKey: host
      remoteRef:
        key: kv/app/dev/postgres-audit
        property: host

    - secretKey: port
      remoteRef:
        key: kv/app/dev/postgres-audit
        property: port

    - secretKey: database
      remoteRef:
        key: kv/app/dev/postgres-audit
        property: database

    - secretKey: username
      remoteRef:
        key: kv/app/dev/postgres-audit
        property: username

    - secretKey: password
      remoteRef:
        key: kv/app/dev/postgres-audit
        property: password

    - secretKey: sslmode
      remoteRef:
        key: kv/app/dev/postgres-audit
        property: sslmode