apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: secret-catalog-service
  namespace: dev
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore

  target:
    name: secret-catalog-service
    creationPolicy: Owner
    deletionPolicy: Retain

  dataFrom:
    - extract:
        key: kv/app/dev/catalog-service