apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: secret-user-service
  namespace: prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: secret-user-service
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: kv/app/prod/user-service