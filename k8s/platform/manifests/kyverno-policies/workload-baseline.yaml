apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: workload-baseline-staging-production
spec:
  background: true

  rules:
    - name: disallow-latest-tag
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - staging
                - production
      validate:
        failureAction: Audit
        failureActionOverrides:
          - action: Enforce
            namespaces:
              - production
        message: "Image tag 'latest' is not allowed in staging/production."
        foreach:
          - list: "request.object.spec.containers"
            deny:
              conditions:
                any:
                  - key: "{{ element.image }}"
                    operator: Equals
                    value: "*:latest"
          - list: "request.object.spec.initContainers || `[]`"
            deny:
              conditions:
                any:
                  - key: "{{ element.image }}"
                    operator: Equals
                    value: "*:latest"

    - name: require-resources
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - staging
                - production
      validate:
        failureAction: Audit
        failureActionOverrides:
          - action: Enforce
            namespaces:
              - production
        message: "CPU/memory requests and limits are required."
        foreach:
          - list: "request.object.spec.containers"
            pattern:
              resources:
                requests:
                  cpu: "?*"
                  memory: "?*"
                limits:
                  cpu: "?*"
                  memory: "?*"

    - name: require-run-as-non-root
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - staging
                - production
      validate:
        failureAction: Audit
        failureActionOverrides:
          - action: Enforce
            namespaces:
              - production
        message: "Containers must set securityContext.runAsNonRoot: true."
        foreach:
          - list: "request.object.spec.containers"
            pattern:
              securityContext:
                runAsNonRoot: true

    - name: require-run-as-user-non-zero
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - staging
                - production
      validate:
        failureAction: Audit
        failureActionOverrides:
          - action: Enforce
            namespaces:
              - production
        message: "Containers must set securityContext.runAsUser to a non-root numeric UID."
        foreach:
          - list: "request.object.spec.containers"
            deny:
              conditions:
                any:
                  - key: "{{ element.securityContext.runAsUser || `0` }}"
                    operator: LessThanOrEquals
                    value: 0

    - name: require-run-as-group-non-zero
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - staging
                - production
      validate:
        failureAction: Audit
        failureActionOverrides:
          - action: Enforce
            namespaces:
              - production
        message: "Containers must set securityContext.runAsGroup to a non-root numeric GID."
        foreach:
          - list: "request.object.spec.containers"
            deny:
              conditions:
                any:
                  - key: "{{ element.securityContext.runAsGroup || `0` }}"
                    operator: LessThanOrEquals
                    value: 0

    - name: require-seccomp-runtime-default
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - staging
                - production
      validate:
        failureAction: Audit
        failureActionOverrides:
          - action: Enforce
            namespaces:
              - production
        message: "Pod must set spec.securityContext.seccompProfile.type: RuntimeDefault."
        pattern:
          spec:
            securityContext:
              seccompProfile:
                type: RuntimeDefault

    - name: disallow-privileged
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - staging
                - production
      validate:
        failureAction: Audit
        failureActionOverrides:
          - action: Enforce
            namespaces:
              - production
        message: "Privileged containers are not allowed."
        foreach:
          - list: "request.object.spec.containers"
            pattern:
              =(securityContext):
                =(privileged): false

    - name: disallow-privilege-escalation
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - staging
                - production
      validate:
        failureAction: Audit
        failureActionOverrides:
          - action: Enforce
            namespaces:
              - production
        message: "Containers must set allowPrivilegeEscalation: false."
        foreach:
          - list: "request.object.spec.containers"
            pattern:
              securityContext:
                allowPrivilegeEscalation: false

    - name: require-drop-all-capabilities
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - staging
                - production
      validate:
        failureAction: Audit
        failureActionOverrides:
          - action: Enforce
            namespaces:
              - production
        message: "Containers must drop all Linux capabilities."
        foreach:
          - list: "request.object.spec.containers"
            pattern:
              securityContext:
                capabilities:
                  drop:
                    - ALL

    - name: require-read-only-root-filesystem
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - staging
                - production
      validate:
        failureAction: Audit
        failureActionOverrides:
          - action: Enforce
            namespaces:
              - production
        message: "Containers must set readOnlyRootFilesystem: true."
        foreach:
          - list: "request.object.spec.containers"
            pattern:
              securityContext:
                readOnlyRootFilesystem: true

    - name: disallow-host-namespaces
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - staging
                - production
      validate:
        failureAction: Audit
        failureActionOverrides:
          - action: Enforce
            namespaces:
              - production
        message: "hostNetwork, hostPID, and hostIPC are not allowed."
        pattern:
          spec:
            =(hostNetwork): false
            =(hostPID): false
            =(hostIPC): false

    - name: disallow-hostpath-volumes
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - staging
                - production
      validate:
        failureAction: Audit
        failureActionOverrides:
          - action: Enforce
            namespaces:
              - production
        message: "hostPath volumes are not allowed."
        pattern:
          spec:
            =(volumes):
              - X(hostPath): "*"

    - name: disallow-hostport
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - staging
                - production
      validate:
        failureAction: Audit
        failureActionOverrides:
          - action: Enforce
            namespaces:
              - production
        message: "hostPort is not allowed."
        foreach:
          - list: "request.object.spec.containers"
            pattern:
              =(ports):
                - X(hostPort): "*"

    - name: require-digest-in-production
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - production
      validate:
        failureAction: Enforce
        message: "Production images must be pinned by digest using image@sha256:..."
        foreach:
          - list: "request.object.spec.containers"
            deny:
              conditions:
                all:
                  - key: "{{ contains(element.image, '@sha256:') }}"
                    operator: Equals
                    value: false
          - list: "request.object.spec.initContainers || `[]`"
            deny:
              conditions:
                all:
                  - key: "{{ contains(element.image, '@sha256:') }}"
                    operator: Equals
                    value: false