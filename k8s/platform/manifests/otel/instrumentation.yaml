apiVersion: opentelemetry.io/v1alpha1
kind: Instrumentation
metadata:
  name: nodejs-instrumentation
  namespace: jaeger
spec:
  exporter:
    endpoint: http://otel-gateway-collector.jaeger.svc.cluster.local:4318
  propagators:
    - tracecontext
    - baggage
  sampler:
    type: parentbased_traceidratio
    argument: "1"
  nodejs:
    env:
      - name: OTEL_RESOURCE_ATTRIBUTES
        value: "deployment.environment=dev,service.namespace=jaeger"