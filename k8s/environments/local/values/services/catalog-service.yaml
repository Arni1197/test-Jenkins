replicaCount: 1

image:
  repository: ghcr.io/arni1197/catalog-service
  tag: sha-69b2c8f50740b67225bd35fd8b959310d2341af1
  digest: "sha256:1594a9592adfe1683dcadae80c3dd14fe53cae575096d4b36833c09e6662a339"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3003

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: workload
              operator: In
              values:
                - apps

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

env:
  NODE_ENV: "development"

terminationGracePeriodSeconds: 30

readinessProbe:
  httpGet:
    path: /api/health/ready
    port: 3003
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 1

livenessProbe:
  httpGet:
    path: /api/health/live
    port: 3003
  initialDelaySeconds: 15
  periodSeconds: 20
  timeoutSeconds: 2
  failureThreshold: 3

autoscaling:
  enabled: false