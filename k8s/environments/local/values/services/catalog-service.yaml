replicaCount: 1

image:
  repository: ghcr.io/arni1197/catalog-service
  tag: sha-dd5d7b92dd72904e6e95b53886cfbfae80371ce7
  digest: "sha256:a5981766ad213b09855d7421b5305e82daf48947afff7c47fd9ee2d39a7082be"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3003
  targetPort: 3003


serviceAccount:
  create: true
  name: catalog-service-sa

automountServiceAccountToken: false
resources:
  requests:
    cpu: 85m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

env:
  NODE_ENV: "development"

terminationGracePeriodSeconds: 30

readinessProbe:
  httpGet:
    path: /api/health/ready
    port: 3003
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 1

livenessProbe:
  httpGet:
    path: /api/health/live
    port: 3003
  initialDelaySeconds: 15
  periodSeconds: 20
  timeoutSeconds: 2
  failureThreshold: 3

autoscaling:
  enabled: false