replicaCount: 1

image:
  repository: ghcr.io/arni1197/catalog-service
  tag: sha-ea2a645f357199956c672513fd65f879f9620a81
  digest: "sha256:73c87441c53e8a168c58f40157f393cddfe5072f38e667f0d46d588f2b901ca1"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3003

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: workload
              operator: In
              values:
                - apps

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

env:
  NODE_ENV: "development"

readinessProbe:
  httpGet:
    path: /api/health
    port: 3003
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 3

livenessProbe:
  httpGet:
    path: /api/health
    port: 3003
  initialDelaySeconds: 15
  periodSeconds: 20
  timeoutSeconds: 2
  failureThreshold: 3

autoscaling:
  enabled: false