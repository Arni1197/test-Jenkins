replicaCount: 1

image:
  repository: ghcr.io/arni1197/catalog-service
  tag: sha-9e2b636577b142e3b7dde4a715e9ab563123a469
  digest: "sha256:59984959ddba820a9231a5603ded92942d2cce25847100a7f1a7b62579cff79a"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3003
  targetPort: 3003


serviceAccount:
  create: true
  name: catalog-service-sa

automountServiceAccountToken: false
resources:
  requests:
    cpu: 85m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

env:
  NODE_ENV: "development"

terminationGracePeriodSeconds: 30

readinessProbe:
  httpGet:
    path: /api/health/ready
    port: 3003
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 1

livenessProbe:
  httpGet:
    path: /api/health/live
    port: 3003
  initialDelaySeconds: 15
  periodSeconds: 20
  timeoutSeconds: 2
  failureThreshold: 3

autoscaling:
  enabled: false