replicaCount: 1

image:
  repository: ghcr.io/arni1197/catalog-service
  tag: sha-6159537ebed5dd5646f50496f9f6f7ac46d3ded6
  digest: "sha256:1107ec4db8f26b882620c362b81242d7cd419fedf465fc3660833efb4a805bf8"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3003
  targetPort: 3003


serviceAccount:
  create: true
  name: catalog-service-sa

automountServiceAccountToken: false
resources:
  requests:
    cpu: 85m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

env:
  NODE_ENV: "development"

terminationGracePeriodSeconds: 30

readinessProbe:
  httpGet:
    path: /api/health/ready
    port: 3003
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 1

livenessProbe:
  httpGet:
    path: /api/health/live
    port: 3003
  initialDelaySeconds: 15
  periodSeconds: 20
  timeoutSeconds: 2
  failureThreshold: 3

autoscaling:
  enabled: false