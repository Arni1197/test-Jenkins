replicaCount: 1

image:
  repository: ghcr.io/arni1197/user-service
  # 🏷️ Человеческая версия (удобно смотреть в UI/логах)
  tag: sha-989717b8d2bf31f4517fce77791f78a45b075878
  # 🔒 Истина для деплоя (если chart настроен на digest)
  digest: "sha256:28096a355a07923a5c821378cbf43e5063068b01b2e65bc84030e87392544439"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3000
  targetPort: 3000

serviceAccount:
  create: true
  name: user-service-sa

autoscaling:
  enabled: false

automountServiceAccountToken: false
resources:
  requests:
    cpu: 85m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

env:
  NODE_ENV: "development"

readinessProbe:
  httpGet:
    path: /api/health
    port: 3000
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 3

livenessProbe:
  httpGet:
    path: /api/health
    port: 3000
  initialDelaySeconds: 15
  periodSeconds: 20
  timeoutSeconds: 2
  failureThreshold: 3