replicaCount: 1

image:
  repository: ghcr.io/arni1197/user-service
  # 🏷️ Человеческая версия (удобно смотреть в UI/логах)
  tag: sha-3c24ab06e68501dc90e53daba0303d5856ffe28b
  # 🔒 Истина для деплоя (если chart настроен на digest)
  digest: "sha256:1e32e7b298a5f97ca8808656bdc76eb888343998dcb0cb448c4bdc4d975943a1"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3000
  targetPort: 3000

serviceAccount:
  create: true
  name: user-service-sa

autoscaling:
  enabled: false

automountServiceAccountToken: false
resources:
  requests:
    cpu: 85m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

env:
  NODE_ENV: "development"

readinessProbe:
  httpGet:
    path: /api/health
    port: 3000
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 3

livenessProbe:
  httpGet:
    path: /api/health
    port: 3000
  initialDelaySeconds: 15
  periodSeconds: 20
  timeoutSeconds: 2
  failureThreshold: 3