replicaCount: 1

image:
  repository: ghcr.io/arni1197/audit-service
  tag: sha-2ee7d7f3451c79243f8d7ec70fcaa8be3bb84f9c
  digest: "sha256:b5c64191a7a0787fe53126d65b84a5b79e46d68b49feef9bb33b4c6a0413cbbf"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3000
  targetPort: 3000

containerPort: 3000

secrets:
  envSecretName: secret-audit-service

env:
  NODE_ENV: "development"

automountServiceAccountToken: false

terminationGracePeriodSeconds: 30

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

extraVolumes:
  - name: tmp
    emptyDir: {}

extraVolumeMounts:
  - name: tmp
    mountPath: /tmp


serviceAccount:
  create: true
  name: audit-service-sa
resources:
  requests:
    cpu: 25m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

readinessProbe:
  httpGet:
    path: /metrics
    port: 3000
  initialDelaySeconds: 40
  periodSeconds: 20
  timeoutSeconds: 2
  failureThreshold: 3

livenessProbe:
  httpGet:
    path: /metrics
    port: 3000
  initialDelaySeconds: 90
  periodSeconds: 20
  timeoutSeconds: 2
  failureThreshold: 3

autoscaling:
  enabled: false