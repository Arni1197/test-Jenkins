replicaCount: 1

image:
  repository: ghcr.io/arni1197/audit-service
  tag: sha-3dccfa36496d5bce9bab32dc65f87b0d880cc19f
  digest: "sha256:0ee3fa20bf7a6d35ab23c5ed9190deb867fad2d0fda23b78541824be0a3b9cd0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3000

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: workload
              operator: In
              values:
                - apps

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: false

env:
  NODE_ENV: "development"

readinessProbe:
  httpGet:
    path: /api/health
    port: 3000
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 3

livenessProbe:
  httpGet:
    path: /api/health
    port: 3000
  initialDelaySeconds: 15
  periodSeconds: 20
  timeoutSeconds: 2
  failureThreshold: 3