replicaCount: 2

image:
  repository: ghcr.io/arni1197/audit-service
  tag: audit-service-v1.0.5
  digest: "sha256:31e1b3a006fc2465869e6fa2df8ae85baae7c832f903e8d88962a6346958e1aa"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3000
  targetPort: 3000

containerPort: 3000

secrets:
  envSecretName: secret-audit-service

serviceAccount:
  create: true
  name: audit-service-sa

automountServiceAccountToken: false

env:
  NODE_ENV: "production"

terminationGracePeriodSeconds: 30

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

extraVolumes:
  - name: tmp
    emptyDir: {}

extraVolumeMounts:
  - name: tmp
    mountPath: /tmp

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: workload
              operator: In
              values:
                - apps

resources:
  requests:
    cpu: 128m
    memory: 256Mi
  limits:
    cpu: 800m
    memory: 512Mi

readinessProbe:
  httpGet:
    path: /metrics
    port: 3000
  initialDelaySeconds: 40
  periodSeconds: 20
  timeoutSeconds: 2
  failureThreshold: 3

livenessProbe:
  httpGet:
    path: /metrics
    port: 3000
  initialDelaySeconds: 90
  periodSeconds: 20
  timeoutSeconds: 2
  failureThreshold: 3

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70


rollout:
  enabled: true
  canary:
    maxSurge: 1
    maxUnavailable: 0
    steps:
      - setWeight: 20
      - pause:
          duration: 120s
      - setWeight: 50
      - pause:
          duration: 120s
      - setWeight: 100