replicaCount: 2

image:
  repository: ghcr.io/arni1197/audit-service
  tag: sha-2ee7d7f3451c79243f8d7ec70fcaa8be3bb84f9c
  digest: "sha256:b5c64191a7a0787fe53126d65b84a5b79e46d68b49feef9bb33b4c6a0413cbbf"
  pullPolicy: IfNotPresent

containerPort: 3000

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: workload
              operator: In
              values:
                - apps

resources:
  requests:
    cpu: 200m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

secretName: secret-audit-service

env:
  NODE_ENV: "staging"

readinessProbe:
  httpGet:
    path: /health
    port: 3000
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 3

livenessProbe:
  httpGet:
    path: /health
    port: 3000
  initialDelaySeconds: 15
  periodSeconds: 20
  timeoutSeconds: 2
  failureThreshold: 3
