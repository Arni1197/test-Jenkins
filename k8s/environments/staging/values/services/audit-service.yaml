replicaCount: 1

image:
  repository: ghcr.io/arni1197/audit-service
  tag: sha-09b5e65afa8e6f9c9bc44ae1bd8739b1cf33a325
  digest: "sha256:3b5f079d7a0f5788b30244dd9e95edf877b055eb2ab3d13d3d59eae745312efe"
  pullPolicy: IfNotPresent

service:
  port: 3000
  targetPort: 3000

containerPort: 3000

automountServiceAccountToken: false

secrets:
  envSecretName: secret-audit-service


rollout:
  enabled: false
env:
  NODE_ENV: "staging"

terminationGracePeriodSeconds: 30

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

extraVolumes:
  - name: tmp
    emptyDir: {}

extraVolumeMounts:
  - name: tmp
    mountPath: /tmp

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: workload
              operator: In
              values:
                - apps

resources:
  requests:
    cpu: 80m
    memory: 256Mi
  limits:
    cpu: 110m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 70

readinessProbe:
  httpGet:
    path: /metrics
    port: 3000
  initialDelaySeconds: 40
  periodSeconds: 20
  timeoutSeconds: 6
  failureThreshold: 6

livenessProbe:
  httpGet:
    path: /metrics
    port: 3000
  initialDelaySeconds: 90
  periodSeconds: 20
  timeoutSeconds: 6
  failureThreshold: 6