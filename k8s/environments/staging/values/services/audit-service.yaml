replicaCount: 1

image:
  repository: ghcr.io/arni1197/audit-service
  tag: sha-9d3103fce33cc17ee085fb86b48ea37d4455779e
  pullPolicy: IfNotPresent

containerPort: 3000

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: workload
              operator: In
              values:
                - apps

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

secretName: secret-audit-service

env:
  NODE_ENV: "staging"