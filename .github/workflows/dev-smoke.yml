name: Dev Smoke Tests

on:
  workflow_dispatch:

jobs:
  smoke:
    name: Run k6 smoke tests on self-hosted runner
    runs-on: [self-hosted, Linux, X64]
    environment: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check k6 version
        run: k6 version

      - name: Run smoke auth-catalog
        env:
          BASE_URL: ${{ vars.BASE_URL }}
          PRODUCT_ID: ${{ vars.PRODUCT_ID }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
        run: k6 run tests/k6/smoke-auth-catalog.js

      - name: Run smoke favorites
        env:
          BASE_URL: ${{ vars.BASE_URL }}
          PRODUCT_ID: ${{ vars.PRODUCT_ID }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
        run: k6 run tests/k6/smoke-favorites.js